# Proxmox Storage Configuration Reference
# Managed via Proxmox UI: Datacenter → Storage
# Or edit /etc/pve/storage.cfg on host

# ── Default local storage (on 240GB SSD) ─────────────────
# Used for: LXC container rootfs, backups, ISO templates
dir: local
    path /var/lib/vz
    content iso,vztmpl,backup

# ── LVM-Thin (on 240GB SSD) ──────────────────────────────
# Used for: LXC container disk images
lvmthin: local-lvm
    thinpool data
    vgname pve
    content rootdir,images

# ── Media Storage (on 2TB HDD) ───────────────────────────
# Add this after mounting the 2TB HDD to /mnt/media
# Setup commands:
#   mkfs.ext4 /dev/sdb          # Format 2TB HDD (adjust device)
#   mkdir -p /mnt/media
#   echo '/dev/sdb /mnt/media ext4 defaults 0 2' >> /etc/fstab
#   mount -a
#   mkdir -p /mnt/media/{movies,tv,music,books,downloads,backups}

dir: media
    path /mnt/media
    content backup

# ── Container IP Layout ───────────────────────────────────
# CT-100  192.168.12.100  wg-server       Alpine  256MB  4GB
# CT-101  192.168.12.101  gluetun-proxy   Alpine  256MB  4GB
# CT-102  192.168.12.102  adguardhome     Debian  512MB  8GB
# CT-110  192.168.12.110  media-stack     Debian  4096MB 32GB
