# NexusOS Limine Boot Configuration - Laptop UEFI ISO
# Used when booting the ISO via UEFI: boot() refers to the embedded EFI FAT
# image which contains only the EFI/ subtree.  The kernel is copied into
# EFI/BOOT/ so it is accessible from boot().
# The installed-disk config (written by the installer) uses boot/nexus-kernel.

timeout: 5
default_entry: 1

/NexusOS Laptop
    protocol: limine
    path: boot():/EFI/BOOT/nexus-kernel
    cmdline: target=laptop loglevel=info
