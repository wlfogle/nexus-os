# NexusOS Zram Swap Configuration — /etc/default/zramswap
# Compressed RAM swap — prevents OOM kills under heavy workloads
# zram-tools reads this file on startup

# Enable zram
ENABLED=true

# Algorithm: zstd offers best compression ratio, lz4 is fastest
ALGO=zstd

# Percentage of total RAM to allocate as compressed swap
# With 64GB RAM, 25% = 16GB compressed (effectively ~32-48GB uncompressed)
PERCENT=25

# Priority (higher than any disk swap)
PRIORITY=100
