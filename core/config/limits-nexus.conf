# ═══════════════════════════════════════════════════════════════════════════
# NexusOS Security Limits — /etc/security/limits.d/90-nexus.conf
# Optimized for audio (PipeWire/JACK), gaming, Docker, AI workloads
# ═══════════════════════════════════════════════════════════════════════════

# ── Real-time priority for audio (PipeWire, JACK) ────────────────────────
@audio          -       rtprio          95
@audio          -       memlock         unlimited
@audio          -       nice            -20

# ── Open file limits for Docker / media stack / databases ────────────────
*               soft    nofile          1048576
*               hard    nofile          1048576
root            soft    nofile          1048576
root            hard    nofile          1048576

# ── Process limits for container workloads ───────────────────────────────
*               soft    nproc           unlimited
*               hard    nproc           unlimited

# ── Memory lock for CUDA / GPU workloads ─────────────────────────────────
*               soft    memlock         unlimited
*               hard    memlock         unlimited

# ── Core dump size (disable for production, enable for debug) ────────────
*               soft    core            0
*               hard    core            0

# ── Message queue size for IPC ───────────────────────────────────────────
*               soft    msgqueue        819200
*               hard    msgqueue        819200
