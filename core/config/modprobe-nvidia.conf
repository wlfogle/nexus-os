# ═══════════════════════════════════════════════════════════════════════════
# NexusOS NVIDIA Module Configuration — /etc/modprobe.d/nexus-nvidia.conf
# RTX 4080 optimized — DRM modeset, power management, persistence
# ═══════════════════════════════════════════════════════════════════════════

# Enable DRM kernel mode setting (required for Wayland, improves X11)
options nvidia-drm modeset=1

# Enable framebuffer console (boot splash, virtual consoles at native res)
options nvidia-drm fbdev=1

# Enable dynamic power management for Turing/Ampere/Ada GPUs
# Allows GPU to enter low-power states when idle
options nvidia NVreg_DynamicPowerManagement=0x02

# Preserve video memory across suspend/resume cycles
# Prevents display corruption after sleep
options nvidia NVreg_PreserveVideoMemoryAllocations=1

# Enable system memory fallback when VRAM is exhausted
# Critical for large AI model loading (LLMs, Stable Diffusion)
options nvidia NVreg_EnableGpuFirmware=0

# Use OS-native page cache for NVIDIA allocations
options nvidia NVreg_UsePageAttributeTable=1

# Enable unified memory for CUDA workloads
options nvidia NVreg_EnableStreamMemOPs=1

# Disable GSP firmware (improves stability on some Ada Lovelace cards)
# Comment this out if you experience GPU hangs
options nvidia NVreg_EnableGpuFirmware=0
