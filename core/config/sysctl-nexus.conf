# ═══════════════════════════════════════════════════════════════════════════
# NexusOS Kernel Tuning — /etc/sysctl.d/90-nexus.conf
# Optimized for i9-13900HX + RTX 4080 + 64GB DDR5
# Gaming, AI/ML workloads, media server, NVIDIA acceleration
# ═══════════════════════════════════════════════════════════════════════════

# ── Memory Management ────────────────────────────────────────────────────
# Low swappiness — keep data in RAM (64GB DDR5)
vm.swappiness = 10
# Aggressive page cache reclaim
vm.vfs_cache_pressure = 50
# Reduce dirty page writeback to avoid I/O stalls during gaming
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
# Allow memory overcommit for GPU/AI workloads
vm.overcommit_memory = 1
vm.overcommit_ratio = 80
# Large page support for NVIDIA CUDA / gaming
vm.nr_hugepages = 1024

# ── File System ──────────────────────────────────────────────────────────
# Increase inotify watches for IDEs, Docker, media watchers
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 8192
fs.inotify.max_queued_events = 32768
# Increase open file limits for Docker / media stack
fs.file-max = 2097152
# Increase AIO for database workloads (PostgreSQL)
fs.aio-max-nr = 1048576

# ── Network — TCP BBR Congestion Control ─────────────────────────────────
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
# Increase buffer sizes for media streaming / large transfers
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216
# Increase connection tracking for Docker / media stack
net.netfilter.nf_conntrack_max = 262144
# Faster TCP keepalive for container networking
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5
# Increase socket backlog for media servers
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 16384
# Enable TCP Fast Open
net.ipv4.tcp_fastopen = 3

# ── Network — Security ──────────────────────────────────────────────────
# Disable ICMP redirects (prevents MITM)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# Ignore ICMP broadcasts
net.ipv4.icmp_echo_ignore_broadcasts = 1
# Enable SYN cookies (SYN flood protection)
net.ipv4.tcp_syncookies = 1
# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
# Enable reverse path filtering
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# Log martian packets
net.ipv4.conf.all.log_martians = 1

# ── Kernel / Scheduler ──────────────────────────────────────────────────
# Reduce scheduler latency for gaming responsiveness
kernel.sched_min_granularity_ns = 1000000
kernel.sched_wakeup_granularity_ns = 500000
kernel.sched_migration_cost_ns = 5000000
# Disable kernel address display in dmesg (security)
kernel.kptr_restrict = 2
# Restrict dmesg access
kernel.dmesg_restrict = 1
# Panic reboot after 10 seconds
kernel.panic = 10
# Enable SysRq (emergency recovery)
kernel.sysrq = 1
# Increase PID max for container workloads
kernel.pid_max = 4194304
# Increase IPC limits for audio/CUDA
kernel.shmmax = 68719476736
kernel.shmall = 4294967296
