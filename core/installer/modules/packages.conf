# NexusOS Calamares Packages Module Configuration
# Remove live-session packages after install, add anything missing
# Use try_remove for all — some packages may not be installed and
# hard remove causes apt exit code 100 which aborts Calamares
---
backend: apt

operations:
    - try_remove:
        - calamares
        - calamares-settings-debian
        - casper
        - lupin-casper
        - os-prober
