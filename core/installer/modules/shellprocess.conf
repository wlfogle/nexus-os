# NexusOS Calamares Post-Install Shell Process
# Runs inside the installed chroot after packages are configured
---
dontChroot: false
timeout: 300

script:
    # Update initramfs with installed kernel modules
    - command: "update-initramfs -u -k all"
      timeout: 120

    # Set Plymouth theme
    - command: >-
        update-alternatives --install /usr/share/plymouth/themes/default.plymouth
        default.plymouth /usr/share/plymouth/themes/nexusos/nexusos.plymouth 200 2>/dev/null;
        update-alternatives --set default.plymouth
        /usr/share/plymouth/themes/nexusos/nexusos.plymouth 2>/dev/null;
        update-initramfs -u 2>/dev/null;
        true
      timeout: 60

    # Enable NexusOS systemd services
    - command: >-
        systemctl enable NetworkManager 2>/dev/null;
        systemctl enable sddm 2>/dev/null;
        systemctl enable docker 2>/dev/null;
        systemctl enable ufw 2>/dev/null;
        systemctl enable fail2ban 2>/dev/null;
        systemctl enable ssh 2>/dev/null;
        systemctl enable fstrim.timer 2>/dev/null;
        systemctl enable nexus-update.timer 2>/dev/null;
        systemctl enable nexus-health.timer 2>/dev/null;
        systemctl enable bluetooth 2>/dev/null;
        systemctl enable cups 2>/dev/null;
        systemctl enable fwupd 2>/dev/null;
        true
      timeout: 30

    # Apply sysctl
    - command: "sysctl --system 2>/dev/null; true"
      timeout: 15

    # Setup Flathub if flatpak is installed
    - command: >-
        if command -v flatpak >/dev/null 2>&1; then
        flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo 2>/dev/null;
        fi;
        true
      timeout: 30

    # Remove live user if it exists
    - command: "userdel -r nexus 2>/dev/null; rm -f /etc/sudoers.d/nexus 2>/dev/null; true"
      timeout: 10

    # Remove autostart for first-run (will re-trigger for real user)
    - command: "true"
      timeout: 5

    # Update GRUB
    - command: "update-grub 2>/dev/null; true"
      timeout: 30
