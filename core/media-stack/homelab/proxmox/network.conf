# /etc/network/interfaces — Proxmox host network config
# Copy to Proxmox host at /etc/network/interfaces
# Adjust enp3s0 to match your actual NIC (check with: ip link)

auto lo
iface lo inet loopback

auto enp3s0
iface enp3s0 inet manual

auto vmbr0
iface vmbr0 inet static
    address 192.168.12.242/24
    gateway 192.168.12.1
    bridge-ports enp3s0
    bridge-stp off
    bridge-fd 0
    dns-nameservers 192.168.12.1

# To apply changes (without reboot):
# systemctl restart networking
# or: ifreload -a
