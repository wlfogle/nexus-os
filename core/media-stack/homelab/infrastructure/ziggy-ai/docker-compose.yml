---
# ============================================================
# Ziggy AI — CT-900 (Open WebUI + SearXNG)
# Open WebUI :3000 → Ollama on laptop (192.168.12.172:11434)
# SearXNG :8081 → private web search backend for Open WebUI
# ============================================================

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_HOST:-http://192.168.12.172:11434}
      - WEBUI_AUTH=false
      - TZ=${TZ:-America/New_York}
    volumes:
      - /opt/appdata/open-webui:/app/backend/data
    extra_hosts:
      - host.docker.internal:host-gateway

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - /opt/appdata/searxng:/etc/searxng
