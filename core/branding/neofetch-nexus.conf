# NexusOS Neofetch Configuration
# Install: cp neofetch-nexus.conf ~/.config/neofetch/config.conf

print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info "Disk" disk
    info "Battery" battery

    info underline

    # NexusOS-specific info
    prin "NexusOS" "1.0 AI-Native"
    prin "CUDA" "$(nvcc --version 2>/dev/null | grep -oP 'release \K[0-9.]+' || echo 'N/A')"
    prin "Ollama" "$(ollama --version 2>/dev/null | awk '{print $NF}' || echo 'N/A')"
    prin "Docker" "$(docker --version 2>/dev/null | grep -oP '[0-9]+\.[0-9]+\.[0-9]+' || echo 'N/A')"
    prin "GPU Driver" "$(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null || echo 'N/A')"
    prin "GPU Temp" "$(nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader 2>/dev/null || echo 'N/A')°C"
    prin "VRAM" "$(nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader 2>/dev/null || echo 'N/A')"

    info cols
}

# Title
title_fqdn="off"

# Kernel
kernel_shorthand="on"

# Distro
distro_shorthand="off"
os_arch="on"

# Uptime
uptime_shorthand="on"

# Memory
memory_percent="on"
memory_unit="gib"

# Packages
package_managers="on"

# Shell
shell_path="off"
shell_version="on"

# CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="on"

# GPU
gpu_brand="on"
gpu_type="all"

# Disk
disk_show=('/' '/home')
disk_subtitle="mount"
disk_percent="on"

# Colors
colors=(4 6 1 8 8 6)
bold="on"
underline_enabled="on"
underline_char="-"
separator=":"

# Text Output
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# Image
image_backend="ascii"
image_source="auto"

# ASCII Art — custom NexusOS logo
ascii_distro="NexusOS"
ascii_colors=(4 6 1 8 8 6)
ascii_bold="on"

# Custom NexusOS ASCII
ascii_custom() {
cat << 'NXEOF'
${c1}    ╔═══╗
${c1}    ║${c2}N X${c1}║
${c1}  ╔═╝   ╚═╗
${c1}  ║ ${c2}NEXUS${c1} ║
${c1}  ║ ${c2} O S ${c1} ║
${c1}  ╚═╗   ╔═╝
${c1}    ║${c2}A I${c1}║
${c1}    ╚═══╝
NXEOF
}

# Progress Bars
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

# Backend Settings
stdout="off"
