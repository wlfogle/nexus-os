---
# AdGuard Home — Network-wide ad blocker
# Primary runtime is on Ziggy Pi (192.168.12.20)
# This compose remains for optional Proxmox-hosted AdGuard deployment

services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host   # Required for DNS on port 53
    volumes:
      - /opt/appdata/adguardhome/work:/opt/adguardhome/work
      - /opt/appdata/adguardhome/conf:/opt/adguardhome/conf
    # Ports exposed via host network mode:
    # 53/tcp+udp  — DNS
    # 3000/tcp    — Initial setup UI (first run only)
    # 80/tcp      — Web UI (after setup)
    # 443/tcp     — HTTPS (optional)

  # Syncs config from primary (this) to Pi replica
  adguardhome-sync:
    image: lscr.io/linuxserver/adguardhome-sync:latest
    container_name: adguardhome-sync
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - CONFIGFILE=/config/adguardhome-sync.yaml
    volumes:
      - /opt/appdata/adguardhome-sync:/config
    ports:
      - "8082:8082"
