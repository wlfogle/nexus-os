# Traefik Static Configuration — CT-103 (Alpine, 192.168.12.103)
# Live config at /etc/traefik/traefik.yml inside CT-103
# Dynamic routes in /etc/traefik/dynamic/ (see infrastructure/traefik/dynamic/)

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true   # LAN-only; lock down with Authentik when exposing externally

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

# No docker provider — CT-103 is Alpine with no Docker socket.
# All routes are defined as static files in /etc/traefik/dynamic/
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Uncomment + configure when real domain + Let's Encrypt is ready:
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: your@email.com
#       storage: /acme.json
#       httpChallenge:
#         entryPoint: web

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
