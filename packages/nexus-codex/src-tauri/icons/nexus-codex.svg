<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="pageL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a2545"/>
    </linearGradient>
    <linearGradient id="pageR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a2545"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Left page shadow -->
  <rect x="92" y="118" width="152" height="282" rx="14" fill="#000000" opacity="0.3" transform="translate(4,4)"/>
  <!-- Right page shadow -->
  <rect x="268" y="118" width="152" height="282" rx="14" fill="#000000" opacity="0.3" transform="translate(4,4)"/>

  <!-- Left page -->
  <rect x="92" y="118" width="152" height="282" rx="14" fill="url(#pageL)" stroke="#1e4d8c" stroke-width="1.5"/>
  <!-- Right page -->
  <rect x="268" y="118" width="152" height="282" rx="14" fill="url(#pageR)" stroke="#1e4d8c" stroke-width="1.5"/>

  <!-- Spine -->
  <rect x="234" y="118" width="44" height="282" rx="10" fill="#0a1f3d" stroke="#1e4d8c" stroke-width="1.5"/>
  <!-- Spine highlight -->
  <rect x="253" y="126" width="6" height="266" rx="3" fill="#1e4d8c" opacity="0.6"/>

  <!-- Left page text lines -->
  <!-- Title line -->
  <rect x="114" y="158" width="108" height="11" rx="5.5" fill="#e94560" opacity="0.92"/>
  <!-- Body lines -->
  <rect x="114" y="184" width="96" height="7" rx="3.5" fill="#8892b0" opacity="0.65"/>
  <rect x="114" y="202" width="102" height="7" rx="3.5" fill="#8892b0" opacity="0.65"/>
  <rect x="114" y="220" width="84" height="7" rx="3.5" fill="#8892b0" opacity="0.55"/>
  <rect x="114" y="238" width="98" height="7" rx="3.5" fill="#8892b0" opacity="0.55"/>
  <rect x="114" y="256" width="76" height="7" rx="3.5" fill="#8892b0" opacity="0.45"/>
  <rect x="114" y="274" width="90" height="7" rx="3.5" fill="#8892b0" opacity="0.45"/>
  <!-- Faded lower lines -->
  <rect x="114" y="292" width="70" height="6" rx="3" fill="#8892b0" opacity="0.3"/>
  <rect x="114" y="308" width="85" height="6" rx="3" fill="#8892b0" opacity="0.25"/>

  <!-- Right page title line -->
  <rect x="290" y="158" width="108" height="11" rx="5.5" fill="#e94560" opacity="0.92"/>
  <!-- Right page body lines -->
  <rect x="290" y="184" width="96" height="7" rx="3.5" fill="#8892b0" opacity="0.65"/>
  <rect x="290" y="202" width="102" height="7" rx="3.5" fill="#8892b0" opacity="0.65"/>
  <rect x="290" y="220" width="84" height="7" rx="3.5" fill="#8892b0" opacity="0.55"/>
  <rect x="290" y="238" width="98" height="7" rx="3.5" fill="#8892b0" opacity="0.55"/>

  <!-- AI neural network — right page lower area -->
  <!-- Connection lines (drawn first, behind nodes) -->
  <line x1="344" y1="308" x2="302" y2="346" stroke="#24c8db" stroke-width="2.5" opacity="0.55"/>
  <line x1="344" y1="308" x2="386" y2="346" stroke="#24c8db" stroke-width="2.5" opacity="0.55"/>
  <line x1="344" y1="308" x2="344" y2="362" stroke="#24c8db" stroke-width="2.5" opacity="0.55"/>
  <line x1="302" y1="346" x2="344" y2="362" stroke="#24c8db" stroke-width="1.5" opacity="0.35"/>
  <line x1="386" y1="346" x2="344" y2="362" stroke="#24c8db" stroke-width="1.5" opacity="0.35"/>
  <line x1="302" y1="346" x2="386" y2="346" stroke="#24c8db" stroke-width="1" opacity="0.25"/>

  <!-- Central node (brightest) -->
  <circle cx="344" cy="308" r="15" fill="#e94560" filter="url(#glow)" opacity="0.95"/>
  <circle cx="344" cy="308" r="8" fill="#ff6b8a"/>

  <!-- Satellite nodes -->
  <circle cx="302" cy="346" r="10" fill="#24c8db" filter="url(#softglow)" opacity="0.88"/>
  <circle cx="302" cy="346" r="5.5" fill="#5ee8f8"/>
  <circle cx="386" cy="346" r="10" fill="#24c8db" filter="url(#softglow)" opacity="0.88"/>
  <circle cx="386" cy="346" r="5.5" fill="#5ee8f8"/>
  <circle cx="344" cy="362" r="8" fill="#24c8db" filter="url(#softglow)" opacity="0.75"/>
  <circle cx="344" cy="362" r="4" fill="#5ee8f8"/>

  <!-- Small accent nodes on left page lower area -->
  <line x1="168" y1="340" x2="148" y2="360" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <line x1="168" y1="340" x2="188" y2="360" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <circle cx="168" cy="340" r="7" fill="#e94560" opacity="0.6" filter="url(#softglow)"/>
  <circle cx="148" cy="360" r="5" fill="#24c8db" opacity="0.5"/>
  <circle cx="188" cy="360" r="5" fill="#24c8db" opacity="0.5"/>

  <!-- Bottom glow accent -->
  <ellipse cx="256" cy="440" rx="140" ry="18" fill="#e94560" opacity="0.08"/>
</svg>
