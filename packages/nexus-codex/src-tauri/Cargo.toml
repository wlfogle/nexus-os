[package]
name = "nexus-codex"
version = "0.1.0"
description = "NexusOS Documentation Intelligence — AI-powered doc analysis, staleness detection, and report generation"
authors = ["wlfogle"]
edition = "2021"

[lib]
name = "nexus_codex_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
walkdir = "2"
ignore = "0.4"
pdf-extract = "0.7"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
once_cell = "1"

