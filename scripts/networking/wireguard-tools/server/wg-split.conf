[Interface]
PrivateKey = YOUR_CLIENT_PRIVATE_KEY
Address = 99.99.99.4/32
DNS = 1.1.1.1, 8.8.8.8

# Custom routing table for split tunneling
Table = 1000

# Post-up commands to set up split tunneling
PostUp = ip rule add fwmark 0x1 table 1000
PostUp = ip route add default dev %i table 1000

# Pre-down commands to clean up
PreDown = ip rule del fwmark 0x1 table 1000 || true
PreDown = ip route del default dev %i table 1000 || true

[Peer]
PublicKey = YOUR_SERVER_PUBLIC_KEY
Endpoint = YOUR_SERVER_IP:51820
# Limited AllowedIPs for split tunnel - only VPN network
AllowedIPs = 99.99.99.0/24
PersistentKeepalive = 25
