# NexusOS Kernel — Cargo build configuration
# Override per build via: --target aarch64-unknown-none-softfloat

[unstable]
build-std         = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

# Default target: x86_64 bare metal (laptop / tiamat)
# Override for Bahamut: --target aarch64-unknown-none-softfloat
[build]
target = "x86_64-unknown-none"

# ─── x86_64 bare metal ───────────────────────────────────────────────────────
[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tnexus-x86_64.ld",
    "-C", "relocation-model=static",
    "-C", "code-model=kernel",
]

# ─── AArch64 bare metal (Bahamut) ────────────────────────────────────────────
[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C", "link-arg=-Tnexus-aarch64.ld",
    "-C", "relocation-model=static",
]
