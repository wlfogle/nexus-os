<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MediaStack Control</title>
<style>
/* ── Reset & Variables ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#30363d;
  --border:#30363d;--border2:#484f58;
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--purple:#bc8cff;
  --r1:6px;--r2:8px;--r3:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
}
html{scrollbar-color:var(--bg3) var(--bg0)}
body{font-family:var(--font);background:var(--bg0);color:var(--t1);line-height:1.5;min-height:100vh}
a{color:var(--blue);text-decoration:none}

/* ── Header ─────────────────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 2rem;background:var(--bg1);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  flex-wrap:wrap;gap:0.75rem;
}
.header-brand{display:flex;align-items:center;gap:0.6rem;font-size:1.25rem;font-weight:700}
.header-brand .bolt{font-size:1.4rem}
.header-right{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.search-box{
  padding:7px 14px;background:var(--bg0);border:1px solid var(--border);
  border-radius:var(--r2);color:var(--t1);font-size:0.85rem;
  width:220px;outline:none;transition:border-color .2s;font-family:var(--font);
}
.search-box:focus{border-color:var(--blue)}
.search-box::placeholder{color:var(--t3)}
.stat-badges{display:flex;gap:0.5rem;align-items:center}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 11px;border-radius:20px;font-size:0.8rem;font-weight:600;
}
.badge.gr{background:rgba(63,185,80,.12);color:var(--green)}
.badge.rd{background:rgba(248,81,73,.12);color:var(--red)}
.badge.bl{background:rgba(88,166,255,.12);color:var(--blue)}

/* ── Main ───────────────────────────────────────────────────────────── */
main{max-width:1440px;margin:0 auto;padding:1.5rem 2rem 3rem}

/* ── System Stats ───────────────────────────────────────────────────── */
.sys-stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1.25rem;margin-bottom:2rem;padding:1.25rem 1.5rem;
  background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);
}
.stat-item label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--t2);margin-bottom:6px}
.stat-item label span{color:var(--t1);font-weight:600}
.bar{height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease,background .4s}
.bar-fill.lo{background:var(--green)}.bar-fill.mid{background:var(--yellow)}.bar-fill.hi{background:var(--red)}

/* ── Category Sections ──────────────────────────────────────────────── */
.cat-section{margin-bottom:2rem}
.cat-head{
  display:flex;align-items:center;gap:.5rem;
  margin-bottom:1rem;padding-bottom:.5rem;
  border-bottom:1px solid var(--border);font-size:1.05rem;color:var(--t2);
}
.cat-head .cnt{font-size:.78rem;color:var(--t3);margin-left:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1rem}

/* ── Service Card ───────────────────────────────────────────────────── */
.card{
  background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);
  padding:1.15rem 1.25rem;transition:border-color .2s,box-shadow .2s;
}
.card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.card-name{display:flex;align-items:center;gap:.45rem;font-weight:600;font-size:.95rem}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.running{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.exited{background:var(--red)}
.dot.paused{background:var(--yellow)}
.dot.restarting{background:var(--blue);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-status{font-size:.78rem;font-weight:500;white-space:nowrap}
.card-status.running{color:var(--green)}
.card-status.exited{color:var(--red)}
.card-status.paused{color:var(--yellow)}
.card-status.restarting{color:var(--blue)}
.card-meta{font-size:.82rem;color:var(--t2);margin-bottom:.7rem;min-height:22px}
.port{
  display:inline-block;background:var(--bg2);padding:1px 7px;
  border-radius:var(--r1);font-family:var(--mono);font-size:.78rem;margin:2px 3px 2px 0;
}
.card-img{font-size:.75rem;color:var(--t3);margin-bottom:.65rem;font-family:var(--mono)}
.card-actions{display:flex;gap:.4rem;flex-wrap:wrap}

/* ── Buttons ────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 10px;border:1px solid var(--border);border-radius:var(--r1);
  background:var(--bg2);color:var(--t1);font-size:.78rem;
  cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap;
}
.btn:hover{border-color:var(--border2);background:var(--bg3)}
.btn-go{border-color:var(--green);color:var(--green)}
.btn-go:hover{background:rgba(63,185,80,.12)}
.btn-stop{border-color:var(--red);color:var(--red)}
.btn-stop:hover{background:rgba(248,81,73,.12)}
.btn-link{border-color:var(--blue);color:var(--blue)}
.btn-link:hover{background:rgba(88,166,255,.12)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ── Modal ──────────────────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;
  display:none;align-items:center;justify-content:center;padding:1.5rem;
}
.overlay.open{display:flex}
.modal{
  background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);
  width:100%;max-width:960px;max-height:82vh;display:flex;flex-direction:column;
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-head h3{font-size:1rem;font-weight:600}
.modal-head .ctrls{display:flex;gap:.5rem;align-items:center}
.modal-head select{
  padding:5px 8px;background:var(--bg0);border:1px solid var(--border);
  border-radius:var(--r1);color:var(--t1);font-size:.8rem;outline:none;
  font-family:var(--font);
}
.modal-body{flex:1;overflow:auto;padding:1rem 1.25rem}
.log-out{
  font-family:var(--mono);font-size:.78rem;line-height:1.7;
  white-space:pre-wrap;word-break:break-all;color:var(--t2);
}

/* ── Toasts ─────────────────────────────────────────────────────────── */
.toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:2000;display:flex;flex-direction:column;gap:.45rem}
.toast{
  padding:10px 18px;border-radius:var(--r2);font-size:.85rem;
  animation:slideIn .3s ease;box-shadow:0 4px 14px rgba(0,0,0,.35);
}
.toast.ok{background:rgba(63,185,80,.92);color:#fff}
.toast.err{background:rgba(248,81,73,.92);color:#fff}
.toast.info{background:rgba(88,166,255,.92);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Empty / Error ──────────────────────────────────────────────────── */
.msg{text-align:center;padding:3rem;color:var(--t2);font-size:1rem}
.msg.err{color:var(--red)}

/* ── Responsive ─────────────────────────────────────────────────────── */
@media(max-width:768px){
  .header{padding:.75rem 1rem}
  .search-box{width:100%}
  .grid{grid-template-columns:1fr}
  .sys-stats{grid-template-columns:1fr}
  main{padding:1rem}
}
</style>
</head>
<body>

<!-- ─── Header ───────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-brand"><span class="bolt">⚡</span> MediaStack Control</div>
  <div class="header-right">
    <input type="text" class="search-box" id="search" placeholder="Search services… ( / )">
    <div class="stat-badges" id="stats"></div>
  </div>
</header>

<!-- ─── Main Content ─────────────────────────────────────────────────── -->
<main>
  <section class="sys-stats" id="sys-stats">
    <div class="stat-item"><label>Loading system stats…</label></div>
  </section>
  <section id="services">
    <div class="msg">Loading services…</div>
  </section>
</main>

<!-- ─── Log Modal ────────────────────────────────────────────────────── -->
<div class="overlay" id="log-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="log-title">Logs</h3>
      <div class="ctrls">
        <select id="log-lines">
          <option value="50">50 lines</option>
          <option value="100" selected>100 lines</option>
          <option value="500">500 lines</option>
          <option value="1000">1000 lines</option>
        </select>
        <button class="btn" id="btn-refresh-log">Refresh</button>
        <button class="btn" id="btn-close-log">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <pre class="log-out" id="log-out">Loading…</pre>
    </div>
  </div>
</div>

<!-- ─── Toasts ───────────────────────────────────────────────────────── -->
<div class="toasts" id="toasts"></div>

<script>
/* ================================================================== *
 *  MediaStack Control — client-side logic                            *
 * ================================================================== */

// ── State ────────────────────────────────────────────────────────────
let searchQuery = '';
let currentLogName = null;

// ── Helpers ──────────────────────────────────────────────────────────
function fmtBytes(b) {
  if (!b) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(1) + ' ' + u[i];
}

function fmtUptime(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 0) return '';
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  return Math.floor(s/86400) + 'd ' + Math.floor((s%86400)/3600) + 'h';
}

function barClass(p) { return p < 70 ? 'lo' : p < 85 ? 'mid' : 'hi'; }

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, type) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── API ──────────────────────────────────────────────────────────────
async function apiGet(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch (e) { console.error(url, e); return null; }
}

async function apiPost(url) {
  try {
    const r = await fetch(url, {method: 'POST'});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'HTTP ' + r.status);
    return d;
  } catch (e) { throw e; }
}

// ── Actions ──────────────────────────────────────────────────────────
async function doAction(name, action) {
  try {
    await apiPost('/api/services/' + encodeURIComponent(name) + '/' + action);
    toast(name + ': ' + action + ' OK', 'ok');
    setTimeout(refreshServices, 800);
  } catch (e) {
    toast(name + ': ' + action + ' failed — ' + e.message, 'err');
  }
}
// expose globally for onclick handlers
window.doAction = doAction;

// ── Log Viewer ───────────────────────────────────────────────────────
async function openLogs(name) {
  currentLogName = name;
  document.getElementById('log-title').textContent = 'Logs — ' + name;
  document.getElementById('log-out').textContent = 'Loading…';
  document.getElementById('log-overlay').classList.add('open');
  await pullLogs();
}
window.openLogs = openLogs;

async function pullLogs() {
  if (!currentLogName) return;
  const n = document.getElementById('log-lines').value;
  const d = await apiGet('/api/services/' + encodeURIComponent(currentLogName) + '/logs?lines=' + n);
  const el = document.getElementById('log-out');
  el.textContent = (d && d.logs) ? d.logs : 'No logs available.';
  el.scrollTop = el.scrollHeight;
}

function closeLogs() {
  currentLogName = null;
  document.getElementById('log-overlay').classList.remove('open');
}

document.getElementById('btn-refresh-log').addEventListener('click', pullLogs);
document.getElementById('btn-close-log').addEventListener('click', closeLogs);
document.getElementById('log-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeLogs();
});

// ── Render: Stats Badges ─────────────────────────────────────────────
function renderBadges(s) {
  document.getElementById('stats').innerHTML =
    '<span class="badge gr">● ' + s.running + ' Running</span>' +
    '<span class="badge rd">● ' + s.stopped + ' Stopped</span>' +
    '<span class="badge bl">' + s.total + ' Total</span>';
}

// ── Render: System Stats ─────────────────────────────────────────────
function renderSys(d) {
  const el = document.getElementById('sys-stats');
  if (!d || d.error) { el.innerHTML = '<div class="stat-item"><label>System stats unavailable</label></div>'; return; }
  el.innerHTML =
    '<div class="stat-item">' +
      '<label>CPU <span>' + d.cpu.percent + '% · ' + d.cpu.cores + ' cores</span></label>' +
      '<div class="bar"><div class="bar-fill ' + barClass(d.cpu.percent) + '" style="width:' + d.cpu.percent + '%"></div></div>' +
    '</div>' +
    '<div class="stat-item">' +
      '<label>Memory <span>' + fmtBytes(d.memory.used) + ' / ' + fmtBytes(d.memory.total) + '</span></label>' +
      '<div class="bar"><div class="bar-fill ' + barClass(d.memory.percent) + '" style="width:' + d.memory.percent + '%"></div></div>' +
    '</div>' +
    '<div class="stat-item">' +
      '<label>Disk <span>' + fmtBytes(d.disk.used) + ' / ' + fmtBytes(d.disk.total) + '</span></label>' +
      '<div class="bar"><div class="bar-fill ' + barClass(d.disk.percent) + '" style="width:' + d.disk.percent + '%"></div></div>' +
    '</div>';
}

// ── Render: Service Grid ─────────────────────────────────────────────
function renderServices(data) {
  const el = document.getElementById('services');
  if (!data || data.error) {
    el.innerHTML = '<div class="msg err">Cannot connect to Docker daemon.</div>';
    return;
  }

  let html = '';
  for (const g of data.groups) {
    const svcs = g.services.filter(s =>
      !searchQuery ||
      s.display_name.toLowerCase().includes(searchQuery) ||
      s.name.toLowerCase().includes(searchQuery) ||
      s.category.toLowerCase().includes(searchQuery)
    );
    if (!svcs.length) continue;

    html += '<div class="cat-section"><div class="cat-head">' +
      '<span>' + esc(svcs[0].icon) + '</span><span>' + esc(g.category) + '</span>' +
      '<span class="cnt">(' + svcs.length + ')</span></div><div class="grid">';

    for (const s of svcs) {
      const run = s.status === 'running';
      const cls = s.status === 'running' ? 'running'
               : s.status === 'paused'  ? 'paused'
               : s.status === 'restarting' ? 'restarting' : 'exited';
      const stxt = s.health ? s.status + ' (' + s.health + ')' : s.status;
      const up = run ? fmtUptime(s.started_at) : '';
      const self = s.name === 'mediastack-control';

      html += '<div class="card"><div class="card-top">' +
        '<div class="card-name"><span class="dot ' + cls + '"></span>' +
        '<span>' + esc(s.icon) + '</span><span>' + esc(s.display_name) + '</span></div>' +
        '<span class="card-status ' + cls + '">' + esc(stxt) + (up ? ' · ' + up : '') + '</span></div>';

      // Ports
      html += '<div class="card-meta">';
      if (s.ports.length) {
        for (const p of s.ports) html += '<span class="port">' + esc(p) + '</span>';
      } else {
        html += '<span style="color:var(--t3)">No exposed ports</span>';
      }
      html += '</div>';

      // Image
      html += '<div class="card-img">' + esc(s.image) + '</div>';

      // Actions
      html += '<div class="card-actions">';
      if (run) {
        html += '<button class="btn btn-stop" onclick="doAction(\'' + s.name + '\',\'stop\')"' + (self?' disabled':'') + '>Stop</button>';
        html += '<button class="btn" onclick="doAction(\'' + s.name + '\',\'restart\')"' + (self?' disabled':'') + '>Restart</button>';
      } else {
        html += '<button class="btn btn-go" onclick="doAction(\'' + s.name + '\',\'start\')">Start</button>';
      }
      html += '<button class="btn" onclick="openLogs(\'' + s.name + '\')">Logs</button>';
      if (s.web_url && run) {
        html += '<a class="btn btn-link" href="' + esc(s.web_url) + '" target="_blank" rel="noopener">Open UI</a>';
      }
      html += '</div></div>';
    }
    html += '</div></div>';
  }

  if (!html) html = '<div class="msg">No services match your search.</div>';
  el.innerHTML = html;
}

// ── Refresh Loops ────────────────────────────────────────────────────
async function refreshServices() {
  const d = await apiGet('/api/services');
  if (d) { renderBadges(d.stats); renderServices(d); }
}

async function refreshSystem() {
  const d = await apiGet('/api/system');
  renderSys(d);
}

// ── Search ───────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase();
  refreshServices();
});

// ── Keyboard shortcuts ───────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLogs();
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ── Init ─────────────────────────────────────────────────────────────
(async function init() {
  await Promise.all([refreshServices(), refreshSystem()]);
  setInterval(refreshServices, 5000);
  setInterval(refreshSystem, 10000);
})();
</script>
</body>
</html>
